<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — NeuralPlan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #ededed; min-height: 100vh; display: flex; flex-direction: column; }

        .top-bar { border-bottom: 1px solid #1a1a1a; padding: 0 2rem; display: flex; align-items: center; height: 52px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #fff; text-decoration: none; }
        .logo-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; }

        .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { width: 100%; max-width: 360px; }

        .card h1 { font-size: 1.6rem; font-weight: 600; color: #fff; letter-spacing: -.02em; margin-bottom: .4rem; }
        .card p.sub { font-size: 13px; color: #555; margin-bottom: 2rem; }

        .alert { padding: 9px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 1.25rem; }
        .alert-error { background: #1a0d0d; border: 1px solid #3a1414; color: #e88; }
        .alert-success { background: #0d1a0d; border: 1px solid #143a14; color: #8e8; }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
        .form-group label { font-size: 12px; color: #555; }
        .form-group input { padding: 9px 12px; border: 1px solid #1a1a1a; border-radius: 8px; background: #111; color: #ededed; font-size: 14px; outline: none; transition: border-color .15s; font-family: inherit; }
        .form-group input:focus { border-color: #333; }
        .form-group input::placeholder { color: #333; }

        .btn { width: 100%; padding: 11px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; margin-top: .25rem; }
        .btn:hover { background: #e5e5e5; }

        .btn-google { width: 100%; padding: 10px; background: #111; color: #ededed; border: 1px solid #1e1e1e; border-radius: 8px; font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; transition: border-color .15s; }
        .btn-google:hover { border-color: #333; }

        .divider-row { display: flex; align-items: center; gap: 10px; margin: 1.5rem 0; }
        .divider-row hr { flex: 1; border: none; border-top: 1px solid #1a1a1a; }
        .divider-row span { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: .06em; }

        .footer { text-align: center; margin-top: 1.75rem; font-size: 12.5px; color: #444; }
        .footer a { color: #888; text-decoration: none; }
        .footer a:hover { color: #fff; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo"><div class="logo-dot"></div>NeuralPlan</div>
</div>

<div class="wrap">
    <div class="card">
        <h1>Sign in</h1>
        <p class="sub">Welcome back — let's get you studying.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${param.registered}" class="alert alert-success">Account created — please sign in.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>

        <div class="divider-row"><hr><span>or</span><hr></div>

        <a th:href="@{/oauth2/authorization/google}" class="btn-google">
            <svg width="16" height="16" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.4 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13 17.8 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 6.9-17z"/>
                <path fill="#FBBC05" d="M10.6 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.9-6.1z"/>
                <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/>
            </svg>
            Continue with Google
        </a>

        <div class="footer">Don't have an account? <a th:href="@{/register}">Sign up</a></div>
    </div>
</div>

</body>
</html>
