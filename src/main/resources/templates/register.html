<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — NeuralPlan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #ededed; min-height: 100vh; display: flex; flex-direction: column; }

        .top-bar { border-bottom: 1px solid #1a1a1a; padding: 0 2rem; display: flex; align-items: center; height: 52px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #fff; text-decoration: none; }
        .logo-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; }

        .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { width: 100%; max-width: 360px; }

        .card h1 { font-size: 1.6rem; font-weight: 600; color: #fff; letter-spacing: -.02em; margin-bottom: .4rem; }
        .card p.sub { font-size: 13px; color: #555; margin-bottom: 2rem; }

        .alert-error { background: #1a0d0d; border: 1px solid #3a1414; color: #e88; padding: 9px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 1.25rem; }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
        .form-group label { font-size: 12px; color: #555; }
        .form-group input { padding: 9px 12px; border: 1px solid #1a1a1a; border-radius: 8px; background: #111; color: #ededed; font-size: 14px; outline: none; transition: border-color .15s; font-family: inherit; }
        .form-group input:focus { border-color: #333; }
        .form-group input::placeholder { color: #333; }

        .btn { width: 100%; padding: 11px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; margin-top: .25rem; }
        .btn:hover { background: #e5e5e5; }

        .footer { text-align: center; margin-top: 1.75rem; font-size: 12.5px; color: #444; }
        .footer a { color: #888; text-decoration: none; }
        .footer a:hover { color: #fff; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo"><div class="logo-dot"></div>NeuralPlan</div>
</div>

<div class="wrap">
    <div class="card">
        <h1>Create account</h1>
        <p class="sub">Start building your personalized study plans.</p>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Full name</label>
                <input type="text" name="name" placeholder="e.g. Mugdha Dakhole" required />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 8 characters" required minlength="8" />
            </div>
            <button type="submit" class="btn">Create account</button>
        </form>

        <div class="footer">Already have an account? <a th:href="@{/login}">Sign in</a></div>
    </div>
</div>

</body>
</html>
